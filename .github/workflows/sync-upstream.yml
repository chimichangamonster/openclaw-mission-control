name: Sync Upstream

on:
  schedule:
    # 1st and 15th of each month at 10:00 UTC
    - cron: "0 10 1,15 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync from upstream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/abhi1693/openclaw-mission-control.git || true
          git fetch upstream

      - name: Check for new commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/master)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Upstream is $BEHIND commits ahead"

      - name: Create sync branch and PR
        if: steps.check.outputs.behind != '0'
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git merge upstream/master --no-edit || true

          # If there are conflicts, commit the merge state so the PR shows them
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "⚠️ Merge conflicts detected — manual resolution required"
            git add -A
            git commit -m "chore: merge upstream (conflicts need resolution)"
          fi

          git push origin "$BRANCH"

          gh pr create \
            --title "chore: sync upstream (${{ steps.check.outputs.behind }} commits)" \
            --body "$(cat <<'EOF'
          ## Upstream Sync

          Merging **${{ steps.check.outputs.behind }}** new commits from [upstream](https://github.com/abhi1693/openclaw-mission-control).

          ⚠️ Check for merge conflicts before merging.

          🤖 Auto-generated by sync-upstream workflow
          EOF
          )" \
            --base master \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
